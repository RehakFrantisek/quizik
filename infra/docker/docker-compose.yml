services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ──
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../services:/app/services
      - upload_data:/app/data/uploads
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ──
  worker:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    command: celery -A apps.api.src.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../services:/app/services
      - upload_data:/app/data/uploads
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js Frontend ──
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ../../apps/web/src:/app/src
      - ../../apps/web/public:/app/public
      - ../../packages:/app/packages
    env_file:
      - ../../.env
    depends_on:
      - api

  # ── MailHog (dev email) ──
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  upload_data:
